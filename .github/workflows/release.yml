name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve version
        id: version
        run: |
          VERSION="$(bun -e 'const pkg = await Bun.file("bridge/elizaos/package.json").json(); console.log(pkg.version)')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          EXPECTED_TAG: v${{ steps.version.outputs.version }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match ${EXPECTED_TAG}" >&2
            exit 1
          fi

      - name: Run test suite
        run: |
          go test ./...
          bun test

      - name: Build release artifacts
        run: bun run build:release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentscope-release-${{ steps.version.outputs.version }}
          path: dist/release/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
